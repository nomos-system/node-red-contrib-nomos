<script data-help-name="nomosapi-createloginchallenge" type="text/x-red">
    <p>The service node represents <strong>createLoginChallenge</strong> nomos system API Function: <br>
        Request a QR login challenge on an unauthenticated connection. The server returns a `challengeId`, a `nomos://login?…` deep-link URI (render as a QR code), an expiry timestamp, and a two-digit `matchCode`. An authenticated device scans the QR code and calls `approveLoginChallenge` to log the waiting device in. The waiting device receives a `loginChallengeApproved` server event upon approval and then calls `init`.<br>(Version 0.3.36)
    </p>
    <ul>
        <li><strong>nomos Controller</strong>: The nomos system Controller connected to</li>
        <li><strong>Name</strong>: <em>optional</em> Name</li>
        <li><strong>Topic</strong>: An <em>optional</em> property that can be configured in the node or, if left blank, can be set by <code>msg.topic</code>. If <em>Filter on Topic</em> is selected <code>msg.topic</code> of incoming messages must match the configured
            value for the message to be accepted. If <em>Filter on Topic</em> is selected and no <em>Topic</em> is set on the node, then <code>msg.topic</code> must match the nodes <em>Name</em></li>
    </ul>

    <h3>Inputs</h3>
    <dl class="message-properties">
        <dl class="message-properties" style="border: none;"><dt>payload <span class="property-type">object</span></dt><dd>The payload object</dd></dl>
<dl class="message-properties" style="border: none;"><dt>payload.requestedGroup <span class="property-type">string</span></dt><dd><em>(optional)</em> User group the waiting device wants to log in as. Defaults to `admin`.<br>Default value: <code>admin</code></dd></dl>
<dl class="message-properties" style="border: none;"><dt>payload.deviceName <span class="property-type">string</span></dt><dd><em>(optional)</em> Human-readable name of the waiting device (e.g. "Living Room Panel")</dd></dl>
<dl class="message-properties" style="border: none;"><dt>payload.platform <span class="property-type">string</span></dt><dd><em>(optional)</em> Platform identifier of the waiting device (e.g. `iOS`, `android`)</dd></dl>

    </dl>

    <h3>Outputs</h3>
    <ol class="node-ports">
         <li>API result
             <dl class="message-properties" style="border: none;"><dt>payload <span class="property-type">object</span></dt><dd>The payload object</dd></dl>
<dl class="message-properties" style="border: none;"><dt>payload.challengeId <span class="property-type">string</span></dt><dd>Unique identifier for this challenge. Pass it to `approveLoginChallenge` or `cancelLoginChallenge`.</dd></dl>
<dl class="message-properties" style="border: none;"><dt>payload.payload <span class="property-type">string</span></dt><dd>Deep-link URI (`nomos://login?...`) to render as a QR code. The approving device scans this code to identify the challenge.</dd></dl>
<dl class="message-properties" style="border: none;"><dt>payload.expiresAt <span class="property-type">string</span></dt><dd>ISO 8601 timestamp after which the challenge is no longer valid.</dd></dl>
<dl class="message-properties" style="border: none;"><dt>payload.matchCode <span class="property-type">string</span></dt><dd>Two-digit numeric code (e.g. `"07"`) displayed on both the waiting device and the approving app so the user can visually confirm they are approving the correct request.</dd></dl>

         </li>
         <li>API error
             <dl class="message-properties">
                 <dt>payload <span class="property-type">object</span></dt>
                 <dd>
                    <dt>payload.errorCode <span class="property-type">integer</span></dt>
                    <dd>Error Code</dd>
                    <dt>payload.errorText <span class="property-type">string</span></dt>
                    <dd>Error Message Text</dd>
                 </dd>
             </dl>
         </li>
    </ol>
